services:
  - type: web
    name: cfg-generator-api
    env: python
    plan: free

    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: DATABASE_URL
        fromDatabase:
          name: cfg-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 15

      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7

      - key: ALLOWED_ORIGINS
        value: http://localhost:5173,http://localhost:3000

      - key: ENVIRONMENT
        value: production

      - key: GEMINI_API_KEY
        sync: false

      - key: GEMINI_MODEL
        value: gemini-2.5-flash

databases:
  - name: cfg-db
    plan: free
    databaseName: cfg_generator
    user: cfg_user